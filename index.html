<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alantv@project</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top left,#1f1f2e,#0f0f17);
color:white;
padding:20px;
}

.container{
text-align:center;
padding:40px;
width:100%;
max-width:500px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1{
font-size:clamp(24px,5vw,42px);
margin-bottom:10px;
}

h1 span{
background:linear-gradient(90deg,#00f7ff,#6a00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
opacity:.75;
margin-bottom:25px;
}

.btn{
display:block;
width:100%;
padding:14px;
border-radius:30px;
background:linear-gradient(90deg,#00f7ff,#6a00ff);
color:white;
font-weight:500;
cursor:pointer;
transition:.3s;
font-size:16px;
margin-bottom:15px;
text-decoration:none;
border:none;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(106,0,255,.5);
}

.copy-menu{
display:none;
margin-top:10px;
}

.copy-menu button{
width:100%;
margin-bottom:10px;
padding:12px;
border:none;
border-radius:20px;
background:#1e1e2f;
color:white;
cursor:pointer;
}

.image-box{
margin-top:20px;
display:none;
}

.image-box img{
width:100%;
border-radius:15px;
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#00f7ff;
color:black;
padding:10px 20px;
border-radius:20px;
font-weight:500;
opacity:0;
transition:.4s;
z-index:999;
}

.toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="container">

<h1>Welcome <span>alantv@project</span></h1>
<p>Enjoy The World Comrade</p>

<!-- GET APP -->
<a
class="btn"
href="intent://open#Intent;
scheme=alantv;
package=studio.scillarium.ottnavigator;
S.browser_fallback_url=https%3A%2F%2Falantvid.pages.dev%2Fapp.apk;
end">
Get App
</a>

<!-- COPY PLAYLIST -->
<button class="btn" onclick="toggleMenu()">
Copy playlist
</button>

<div class="copy-menu" id="copyMenu">

<button onclick="copyLink('https://alantvid.pages.dev/tvid.m3u')">
Tvid
</button>

<button onclick="copyLink('https://alantvid.pages.dev/txx.m3u')">
Txx
</button>

</div>

<!-- NYAWITS -->
<button class="btn" onclick="showImage()">
Nyawits
</button>

<div class="image-box" id="sawitImage">
<img src="nyawits.png" alt="Tandan Sawit">
</div>

</div>

<div class="toast" id="toast">
congrats Comrades!
</div>

<script>

function toggleMenu(){

const menu = document.getElementById("copyMenu");

if(menu.style.display === "block"){
menu.style.display = "none";
}else{
menu.style.display = "block";
}

}

function showImage(){

const img = document.getElementById("sawitImage");

if(img.style.display === "block"){
img.style.display = "none";
}else{
img.style.display = "block";
}

}

function copyLink(url){

navigator.clipboard.writeText(url)
.then(() => {

const toast = document.getElementById("toast");

toast.classList.add("show");

setTimeout(() => {
toast.classList.remove("show");
},2000);

})
.catch(() => {
alert("Copy gagal");
});

}

</script
</body>
</html>
